<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <div class="glass-card p-8 rounded-3xl">
        <h3 class="text-2xl font-bold mb-6 flex items-center">
            <span class="mr-3">⚖️</span> BMI Calculator
        </h3>
        
        <div class="space-y-6">
            <div>
                <label class="text-sm text-slate-400 block mb-2">Height (cm)</label>
                <input type="number" ng-model="calc.height" class="input-field text-xl" placeholder="e.g. 175">
            </div>
            <div>
                <label class="text-sm text-slate-400 block mb-2">Weight (kg)</label>
                <input type="number" ng-model="calc.weight" class="input-field text-xl" placeholder="e.g. 70">
            </div>
            <button ng-click="calculateBMI()" class="btn-primary w-full py-4 rounded-2xl font-bold text-lg">
                Calculate & Save
            </button>
        </div>

        <div ng-if="result" class="mt-8 p-6 bg-slate-800/50 rounded-2xl border border-blue-500/30 text-center fade-in">
            <p class="text-slate-400 text-sm uppercase">Your Current BMI</p>
            <h2 class="text-5xl font-black text-blue-400 my-2">{{result.bmi | number:1}}</h2>
            <p class="font-bold" ng-class="getCategoryClass(result.category)">{{result.category}}</p>
        </div>
    </div>

    <div class="glass-card p-8 rounded-3xl">
        <h3 class="text-xl font-bold mb-6">Progress Log</h3>
        <div class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
            <div ng-repeat="item in bmiHistory | orderBy:'-date'" class="flex justify-between items-center p-4 bg-slate-800/30 rounded-xl border border-slate-700/50">
                <div>
                    <p class="text-xs text-slate-500 uppercase font-bold">{{item.date}}</p>
                    <p class="text-lg font-semibold">{{item.weight}} kg</p>
                </div>
                <div class="text-right">
                    <p class="text-xl font-bold" ng-class="getCategoryClass(item.category)">{{item.bmi | number:1}}</p>
                    <p class="text-xs text-slate-500">{{item.category}}</p>
                </div>
            </div>
            
            <div ng-if="bmiHistory.length === 0" class="text-center py-10 text-slate-500 italic">
                No logs yet. Start by calculating your BMI!
            </div>
        </div>
    </div>
</div>
