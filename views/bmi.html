<div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
    <div class="glass-panel">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-2xl font-bold text-white">⚖️ BMI Calculator</h3>
            <button ng-click="toggleSystem()" class="btn-glass text-xs px-3 py-1">
                Switch to {{system === 'metric' ? 'Imperial' : 'Metric'}}
            </button>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="text-sm text-slate-400 block mb-2">Height ({{system === 'metric' ? 'cm' : 'in'}})</label>
                <input type="number" ng-model="calc.height" class="glass-input" placeholder="Height">
            </div>
            <div>
                <label class="text-sm text-slate-400 block mb-2">Weight ({{system === 'metric' ? 'kg' : 'lb'}})</label>
                <input type="number" ng-model="calc.weight" class="glass-input" placeholder="Weight">
            </div>
            <button ng-click="saveBMI()" class="btn-glass-primary w-full py-3" ng-disabled="loading">
                {{loading ? 'Saving...' : 'Save & Record'}}
            </button>
            <div ng-if="error" class="text-red-400 text-sm text-center mt-2">{{error}}</div>
        </div>

        <div ng-if="preview" class="mt-8 p-6 bg-black/20 rounded-2xl border border-white/5 text-center" ng-class="getCategoryClass(preview.category)">
            <p class="text-slate-400 text-sm uppercase tracking-widest mb-2">Live Preview</p>
            <h2 class="text-5xl font-black my-2">{{preview.bmi}}</h2>
            <p class="font-bold uppercase">{{preview.category}}</p>
        </div>
    </div>

    <div class="glass-panel">
        <h3 class="text-xl font-bold mb-6 text-white border-b border-white/10 pb-4">History Log</h3>
        <div class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
            <div ng-repeat="item in bmiHistory track by item._id" 
                 class="flex justify-between items-center p-4 bg-white/5 rounded-xl border border-white/5">
                <div>
                    <p class="text-xs text-slate-500 mb-1">{{item.createdAt | date:'mediumDate'}}</p>
                    <p class="text-sm text-white">
                        H: {{item.height}} | W: {{item.weight}} 
                        <span class="text-[10px] opacity-40 ml-2 uppercase">{{item.system}}</span>
                    </p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p class="text-xl font-bold" ng-class="getCategoryClass(item.category)">{{item.bmi}}</p>
                        <p class="text-[10px] text-slate-400 uppercase">{{item.category}}</p>
                    </div>
                    <button ng-click="removeBMI(item._id)" class="text-slate-600 hover:text-red-500 transition-colors">✕</button>
                </div>
            </div>
            
            <div ng-if="bmiHistory.length === 0" class="text-center py-10 text-slate-500">
                No records yet.
            </div>
        </div>
    </div>
</div>
