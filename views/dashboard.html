<div class="mb-8">
    <div class="glass-panel text-center">
        <h2 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
            "{{dailyMotivation}}"
        </h2>
    </div>
</div>

<div class="dashboard-grid mb-8">
    <div class="glass-panel stat-card">
        <div class="stat-value text-glow">{{todayCalories}}</div>
        <div class="stat-label">Today's Calories</div>
    </div>

    <!-- Embedded Water Widget -->
    <div class="glass-panel flex flex-col items-center justify-center relative overflow-hidden" ng-controller="WaterTrackerController">
        <div class="absolute bottom-0 left-0 right-0 bg-blue-500/20" ng-style="getProgressStyle()"></div>
        <div class="relative z-10 text-center">
            <h3 class="text-lg font-bold mb-2 text-white">Hydration</h3>
            <div class="stat-value text-blue-400">{{currentIntake}} <span class="text-sm">/ {{dailyGoal}}ml</span></div>
            <button ng-click="addWater(250)" class="btn-glass-primary mt-4 rounded-full w-12 h-12 flex items-center justify-center text-xl pb-1" title="Add 250ml">
                +
            </button>
        </div>
    </div>
</div>

<div class="dashboard-grid">
    <div class="glass-panel">
        <h3 class="text-lg font-semibold mb-6 tracking-wide text-gray-300">Weekly Calorie Burn</h3>
        <canvas id="calorieChart"></canvas>
    </div>

    <div class="glass-panel">
        <h3 class="text-lg font-semibold mb-6 tracking-wide text-gray-300">Workout Distribution</h3>
        <div class="w-2/3 mx-auto">
            <canvas id="typeChart"></canvas>
        </div>
    </div>
</div>
