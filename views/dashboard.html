<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="glass-card p-6 rounded-2xl">
        <p class="text-slate-400 text-sm uppercase tracking-wider">Total Workouts</p>
        <h2 class="text-4xl font-bold mt-2 text-blue-400">{{stats.totalWorkouts || 0}}</h2>
    </div>

    <div class="glass-card p-6 rounded-2xl">
        <p class="text-slate-400 text-sm uppercase tracking-wider">Calories Burned</p>
        <h2 class="text-4xl font-bold mt-2 text-orange-400">{{stats.totalCalories || 0}} <span class="text-sm">kcal</span></h2>
    </div>

    <div class="glass-card p-6 rounded-2xl">
        <p class="text-slate-400 text-sm uppercase tracking-wider">Total Duration</p>
        <h2 class="text-4xl font-bold mt-2 text-emerald-400">{{stats.totalDuration || 0}} <span class="text-sm">mins</span></h2>
    </div>
</div>

<div class="mt-8 glass-card p-8 rounded-2xl">
    <div class="flex justify-between items-center mb-6">
        <h3 class="text-xl font-semibold">Quick Actions</h3>
    </div>
    <div class="flex gap-4">
        <a href="#!/workouts" class="btn-primary px-6 py-3 rounded-xl font-semibold">Log New Workout</a>
        <button class="bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-xl font-semibold">Update BMI</button>
    </div>
</div>

<div class="grid md:grid-cols-2 gap-6 mt-8">

    <div class="glass-card p-6 rounded-2xl">
        <h3 class="text-lg font-semibold mb-4">Weekly Calories</h3>
        <canvas id="calorieChart"></canvas>
    </div>

    <div class="glass-card p-6 rounded-2xl">
        <h3 class="text-lg font-semibold mb-4">Workout Distribution</h3>
        <canvas id="typeChart"></canvas>
    </div>

</div>
