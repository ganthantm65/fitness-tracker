<div class="max-w-md mx-auto mt-16 fade-in">
    <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl relative border border-white/10 overflow-hidden">
        
        <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-500/20 blur-[70px] rounded-full"></div>
        <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-500/20 blur-[70px] rounded-full"></div>

        <div class="text-center mb-10 relative z-10">
            <div class="inline-block p-5 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-3xl mb-6 shadow-inner">
                <span class="text-5xl" ng-if="isLoginMode">🔐</span>
                <span class="text-5xl" ng-if="!isLoginMode">🚀</span>
            </div>
            <h2 class="text-4xl font-black text-white tracking-tight">
                {{ isLoginMode ? 'Welcome Back' : 'Create Account' }}
            </h2>
            <p class="text-slate-400 mt-3 font-medium">
                {{ isLoginMode ? 'Enter your details to stay on track.' : 'Join the community and start tracking.' }}
            </p>
        </div>

        <form ng-submit="isLoginMode ? login() : register()" novalidate class="relative z-10">
            <div class="space-y-6">
                
                <div ng-if="!isLoginMode" class="fade-in group">
                    <label class="block text-[10px] text-slate-500 uppercase font-bold tracking-[0.2em] ml-2 mb-2 group-focus-within:text-blue-400 transition-colors">Full Name</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl pointer-events-none opacity-80">👤</span>
                        <input type="text" 
                               ng-model="user.username" 
                               class="input-field" 
                               placeholder="John Doe" 
                               ng-required="!isLoginMode">
                    </div>
                </div>

                <div class="group">
                    <label class="block text-[10px] text-slate-500 uppercase font-bold tracking-[0.2em] ml-2 mb-2 group-focus-within:text-blue-400 transition-colors">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl pointer-events-none opacity-80">📧</span>
                        <input type="email" 
                               ng-model="user.email" 
                               class="input-field" 
                               placeholder="name@example.com" 
                               required>
                    </div>
                </div>

                <div class="group">
                    <label class="block text-[10px] text-slate-500 uppercase font-bold tracking-[0.2em] ml-2 mb-2 group-focus-within:text-blue-400 transition-colors">Password</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl pointer-events-none opacity-80">🔑</span>
                        <input type="password" 
                               ng-model="user.password" 
                               class="input-field" 
                               placeholder="••••••••" 
                               required>
                    </div>
                </div>

                <button type="submit" 
                        class="btn-primary w-full py-5 rounded-2xl font-bold text-lg mt-4 shadow-xl flex items-center justify-center gap-3 transition-all active:scale-[0.98]"
                        ng-disabled="loading">
                    <span ng-if="loading" class="animate-spin text-2xl">⏳</span>
                    {{ loading ? 'Securing Account...' : (isLoginMode ? 'Sign In' : 'Get Started') }}
                </button>
            </div>
        </form>

        <div class="mt-10 text-center text-sm border-t border-white/5 pt-8 relative z-10">
            <p class="text-slate-500 font-medium">
                {{ isLoginMode ? "Don't have an account?" : "Already a member?" }}
                <button ng-click="toggleMode()" class="text-blue-400 font-bold hover:text-blue-300 transition-colors ml-1">
                    {{ isLoginMode ? 'Register Now' : 'Login instead' }}
                </button>
            </p>
        </div>

        <div ng-if="error" class="mt-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-2xl text-center backdrop-blur-md">
            <strong>Error:</strong> {{error}}
        </div>
    </div>

    <p class="text-center text-slate-700 text-[10px] mt-12 uppercase tracking-[0.4em] font-black opacity-40">
        FitTrack Pro &copy; 2026
    </p>
</div>
