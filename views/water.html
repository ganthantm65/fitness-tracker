<div class="max-w-2xl mx-auto fade-in-up md:mt-10">
    <div class="glass-panel p-10 text-center relative overflow-hidden group">
        
        <!-- Animated Background Liquid -->
        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-blue-600/40 to-blue-400/20 w-full" 
             ng-style="getProgressStyle()" 
             style="z-index: 0; box-shadow: 0 -10px 20px rgba(59, 130, 246, 0.2);"></div>
        
        <div class="relative z-10">
            <h2 class="text-3xl font-bold text-white mb-2">Daily Hydration</h2>
            <p class="text-slate-300 font-medium mb-10">Drink water to keep your metabolism running!</p>
            
            <div class="stat-value text-blue-300 mb-2" style="-webkit-background-clip: unset; background-clip: unset; -webkit-text-fill-color: unset; font-size: 4rem;">
                {{currentIntake}} <span class="text-xl text-blue-200/50">/ {{dailyGoal}} ml</span>
            </div>
            
            <div class="text-lg font-bold mb-10" ng-class="animatedPercentage >= 100 ? 'text-emerald-400 text-glow' : 'text-blue-300'">
                {{animatedPercentage | number:0}}% Achieved
            </div>

            <div class="flex flex-wrap justify-center gap-4">
                <button ng-click="addWater(250)" class="btn-glass-primary px-8 py-4 text-lg flex items-center gap-2">
                    <span class="text-2xl">💧</span> +250ml
                </button>
                <button ng-click="addWater(500)" class="btn-glass px-8 py-4 text-lg flex items-center gap-2 border-blue-500/30 hover:bg-blue-500/10">
                    <span class="text-2xl">🚰</span> +500ml
                </button>
            </div>
            
            <button ng-click="resetWater()" class="mt-8 text-xs text-slate-500 hover:text-white underline decoration-slate-600 transition-colors">
                Reset Today's Log
            </button>
        </div>
    </div>
    
    <div class="glass-panel mt-8">
        <h3 class="text-lg font-bold mb-4 text-white">Today's Log</h3>
        <div class="space-y-2 max-h-[250px] overflow-y-auto">
            <div ng-repeat="log in history track by $index" class="flex justify-between items-center bg-black/20 p-3 rounded-lg border border-white/5">
                <div class="text-slate-300 font-mono text-sm">{{log.time}}</div>
                <div class="font-bold text-blue-400">+{{log.amount}} ml</div>
            </div>
            <div ng-if="history.length === 0" class="text-slate-500 text-center py-6 text-sm">
                No water logged today.
            </div>
        </div>
    </div>
</div>
