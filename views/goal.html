<div class="max-w-2xl mx-auto fade-in">
    <div class="glass-card p-10 rounded-3xl shadow-xl">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-white">Set Your Targets</h2>
            <p class="text-slate-400 mt-2">Define your daily and weekly fitness milestones.</p>
        </div>

        <form ng-submit="saveGoals()">
            <div class="space-y-8">
                <div class="p-6 bg-slate-800/40 rounded-2xl border border-slate-700">
                    <div class="flex justify-between items-center mb-4">
                        <label class="font-semibold text-lg">Daily Calorie Target</label>
                        <span class="text-blue-400 font-bold text-xl">{{goals.dailyCalorieGoal}} kcal</span>
                    </div>
                    <input type="range" ng-model="goals.dailyCalorieGoal" min="1200" max="5000" step="50" 
                           class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    <div class="flex justify-between text-xs text-slate-500 mt-2">
                        <span>1200 kcal</span>
                        <span>5000 kcal</span>
                    </div>
                </div>

                <div class="p-6 bg-slate-800/40 rounded-2xl border border-slate-700">
                    <div class="flex justify-between items-center mb-4">
                        <label class="font-semibold text-lg">Weekly Workouts</label>
                        <span class="text-emerald-400 font-bold text-xl">{{goals.weeklyWorkoutGoal}} Days</span>
                    </div>
                    <div class="flex justify-between gap-2">
                        <button type="button" ng-repeat="n in [1,2,3,4,5,6,7]" 
                                ng-click="goals.weeklyWorkoutGoal = n"
                                ng-class="goals.weeklyWorkoutGoal == n ? 'bg-emerald-500 text-white' : 'bg-slate-700 text-slate-300'"
                                class="flex-1 py-3 rounded-xl font-bold transition-all">
                            {{n}}
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary w-full py-4 rounded-2xl font-bold text-xl shadow-lg" ng-disabled="loading">
                    <span ng-if="!loading">Update My Goals</span>
                    <span ng-if="loading">Saving...</span>
                </button>
            </div>
        </form>

        <div ng-if="message" class="mt-6 p-4 rounded-xl text-center font-medium animate-pulse"
             ng-class="message.type == 'success' ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'">
            {{message.text}}
        </div>
    </div>
</div>
